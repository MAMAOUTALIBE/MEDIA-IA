server {
  listen 80;
  server_name n8n.cmr.gmd2025.org;
  # Workflows peuvent renvoyer des payloads volumineux (uploads médias).
  client_max_body_size 100M;

  # Sécurité — admin UI ne doit jamais être indexée ni iframée
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

  location / {
    proxy_pass http://cmr-n8n:5678;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # WebSocket pour le live editor n8n
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # SSE longues / workflows synchrones — n8n peut tenir 5+ min sur un appel
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;
  }
}

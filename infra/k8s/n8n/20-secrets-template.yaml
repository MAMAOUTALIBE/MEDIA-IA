# =============================================================================
# CMR · Sprint A — n8n secrets template
# =============================================================================
# CE FICHIER N'EST PAS À APPLIQUER TEL QUEL.
#
# Il documente les Secrets attendus. En prod, ils sont fournis par Vault Agent
# (sidecar) ou par External Secrets Operator. La rotation se fait hors-cluster
# (Vault) et le Secret est rechargé via `kubectl rollout restart`.
#
# Pour un test local (kind/minikube) :
#   $ infra/k8s/n8n/scripts/make-secrets.sh apply
#
# ⚠️ N'utilisez les valeurs en clair ci-dessous QUE pour un cluster jetable.
#    Toute clé qui finit en prod doit venir de Vault.
# =============================================================================

# --- n8n-encryption ----------------------------------------------------------
# Clé de chiffrement des credentials enregistrés dans n8n.
# Si elle est perdue, TOUS les credentials enregistrés sont irrécupérables —
# c'est intentionnel (un dump DB seul ne suffit pas à exfiltrer les tokens
# YouTube/Meta). Stocker dans Vault sous le chemin `cmr/n8n/encryption-key`.
# Génération : openssl rand -hex 32
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-encryption
  namespace: cmr-automation
type: Opaque
stringData:
  encryption-key: "REPLACE_ME_openssl_rand_hex_32"

# --- n8n-db-creds ------------------------------------------------------------
# Mot de passe du user `n8n_user` côté Postgres (NON le superuser).
# Création :
#   openssl rand -hex 32 > /tmp/n8n_pwd
#   kubectl -n cmr-automation create secret generic n8n-db-creds \
#     --from-file=password=/tmp/n8n_pwd
#   shred -u /tmp/n8n_pwd
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-db-creds
  namespace: cmr-automation
type: Opaque
stringData:
  password: "REPLACE_ME_openssl_rand_hex_32"

# --- n8n-pg-bootstrap (éphémère) --------------------------------------------
# Secret superuser nécessaire UNIQUEMENT au Job 10-postgres-init-job.yaml.
# À supprimer aussitôt le Job en succès :
#   kubectl -n cmr-automation delete secret n8n-pg-bootstrap
# (le runbook README §3 le rappelle).
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-pg-bootstrap
  namespace: cmr-automation
  annotations:
    cmr.gmd2025.org/ephemeral: "true"
    cmr.gmd2025.org/delete-after: "successful-pg-init-job"
type: Opaque
stringData:
  superuser: "postgres"
  superuser_password: "REPLACE_ME_from_vault_cmr_postgres_superuser"

# --- n8n-cmr-api-token -------------------------------------------------------
# JWT court-vie émis par POST /api/auth/service-token (rôle admin only).
# TTL max 24h enforced côté API. Rotation automatique toutes les 12h via cron
# K8s (Sprint D). En attendant, l'admin doit re-créer ce Secret manuellement
# tous les jours et lancer `kubectl rollout restart deploy/n8n`.
#
# Procédure de génération initiale :
#   curl -X POST https://api.cmr.gmd2025.org/api/auth/service-token \
#     -H "Authorization: Bearer <admin_jwt>" \
#     -H "Content-Type: application/json" \
#     -d '{"label":"n8n-prod","ttlSeconds":86400}' \
#     | jq -r .token \
#     > /tmp/svc_token
#   kubectl -n cmr-automation create secret generic n8n-cmr-api-token \
#     --from-file=token=/tmp/svc_token
#   shred -u /tmp/svc_token
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-cmr-api-token
  namespace: cmr-automation
  annotations:
    cmr.gmd2025.org/rotate-every: "12h"
    cmr.gmd2025.org/max-ttl: "24h"
type: Opaque
stringData:
  token: "REPLACE_ME_via_POST_auth_service-token"

# --- n8n-user-mgmt-jwt -------------------------------------------------------
# Secret JWT que n8n utilise pour signer les sessions de son admin UI.
# Distinct du JWT_SECRET de l'API CMR (compromission isolée — N8N-PLAN §3.2).
# Génération : openssl rand -hex 64
---
apiVersion: v1
kind: Secret
metadata:
  name: n8n-user-mgmt-jwt
  namespace: cmr-automation
type: Opaque
stringData:
  jwt-secret: "REPLACE_ME_openssl_rand_hex_64"

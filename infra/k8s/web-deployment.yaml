# =============================================================================
# CMR Web — Kubernetes Deployment (Sprint 8)
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cmr-web
  namespace: cmr
  labels:
    app: cmr-web
    component: web
    tier: frontend
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: cmr-web
  template:
    metadata:
      labels:
        app: cmr-web
    spec:
      serviceAccountName: cmr-web
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/cmr/web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.cmr.gov.example/api"
            - name: NEXT_PUBLIC_SOCKET_URL
              value: "https://api.cmr.gov.example"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          envFrom:
            - secretRef:
                name: cmr-web-secrets
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 500m, memory: 512Mi }
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
            - { name: nextcache, mountPath: /app/.next/cache }
      volumes:
        - { name: tmp, emptyDir: { sizeLimit: 64Mi } }
        - { name: nextcache, emptyDir: { sizeLimit: 512Mi } }
---
apiVersion: v1
kind: Service
metadata:
  name: cmr-web
  namespace: cmr
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app: cmr-web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cmr
  namespace: cmr
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/limit-rps: "100"
spec:
  ingressClassName: nginx
  tls:
    - hosts: [cmr.gov.example, api.cmr.gov.example]
      secretName: cmr-tls
  rules:
    - host: cmr.gov.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: cmr-web, port: { number: 80 } }
    - host: api.cmr.gov.example
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service: { name: cmr-api, port: { number: 80 } }

version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Dakar
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Africa/Dakar
    labels:
      - dependencies
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      next-react:
        patterns:
          - next
          - react
          - react-dom
          - "@types/react*"
      tanstack:
        patterns:
          - "@tanstack/*"
      tailwind:
        patterns:
          - tailwindcss
          - "@tailwindcss/*"
          - tw-animate-css
      base-ui:
        patterns:
          - "@base-ui/*"
          - "@radix-ui/*"
      types:
        patterns:
          - "@types/*"
        dependency-type: development
    open-pull-requests-limit: 6

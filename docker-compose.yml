services:
  # --------------------------------------------------------------------
  # Postgres 16 — base principale (Sprint 0.1)
  # --------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: cmr-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cmr}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-cmr_dev}
    ports:
      - "5435:5432"
    volumes:
      - cmr-pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cmr} -d ${POSTGRES_DB:-cmr_dev}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [cmr-net]

  # --------------------------------------------------------------------
  # Redis 7 — cache + BullMQ + rate-limit store (Sprint 0.4 / 1)
  # --------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: cmr-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6381:6379"
    volumes:
      - cmr-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [cmr-net]

  # --------------------------------------------------------------------
  # MinIO — S3-compatible souverain (Sprint 4 DAM)
  # --------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: cmr-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cmr-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-cmr-minio-changeme}
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - cmr-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [cmr-net]

  # --------------------------------------------------------------------
  # Mailpit — capture des emails de dev (login, notifications)
  # --------------------------------------------------------------------
  mailpit:
    image: axllent/mailpit:latest
    container_name: cmr-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025" # web UI
      - "1025:1025" # SMTP
    networks: [cmr-net]

  # --------------------------------------------------------------------
  # API NestJS (build local) — démarrée par docker-compose --profile app up
  # --------------------------------------------------------------------
  api:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/api.Dockerfile
    container_name: cmr-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-cmr}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-cmr_dev}?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-28800}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "4000:4000"
    networks: [cmr-net]

  web:
    profiles: ["app"]
    build:
      context: .
      dockerfile: infra/web.Dockerfile
    container_name: cmr-web
    restart: unless-stopped
    depends_on: [api]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    networks: [cmr-net]

volumes:
  cmr-pg-data:
  cmr-redis-data:
  cmr-minio-data:

networks:
  cmr-net:
    driver: bridge
